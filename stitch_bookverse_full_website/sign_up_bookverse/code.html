<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

                        "on-secondary-container": "#454386",
                        "tertiary": "#7e3000",

                        "error": "#ba1a1a",
                        "tertiary-container": "#a44100",
                        "surface-bright": "#fbf9f5",
                        "surface-variant": "#e4e2de",
                        "primary": "#3525cd",
                        "tertiary-fixed-dim": "#ffb695",
                        "surface-tint": "#4d44e3",
                        "on-tertiary-container": "#ffd2be",
                        "secondary-fixed-dim": "#c3c0ff",
                        "on-secondary-fixed-variant": "#413f82",
                        "inverse-on-surface": "#f2f0ed",
                        "on-error": "#ffffff",
                        "secondary": "#58579b",
                        "on-tertiary-fixed": "#351000",
                        "on-background": "#1b1c1a",
                        "surface-container-high": "#eae8e4",
                        "inverse-primary": "#c3c0ff",
                        "background": "#fbf9f5",
                        "outline-variant": "#c7c4d8",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "primary-fixed": "#e2dfff",
                        "on-primary-container": "#dad7ff",
                        "tertiary-fixed": "#ffdbcc",
                        "inverse-surface": "#30312e",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-secondary": "#ffffff",
                        "surface-container": "#efeeea",
                        "secondary-fixed": "#e2dfff",
                        "on-primary-fixed": "#0f0069",
                        "surface-container-highest": "#e4e2de",
                        "on-secondary-fixed": "#140f54",

                    "borderRadius": {

                        "full": "9999px"

                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                },
            },
        }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.noise-overlay {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBqz1WKxThc0xyGzGABlSGE_HByNLEowF3uxylfcPmLe6xJQM7g8_40Cn4r9BXvZ48pjguQravoteMpjJzpBeYfJoTHLpzcfinmyu2L3nIUiIB30Fq1vtj_oR-lQpbP_9K5AE8jj4av4MZKs-n8yiLsaoY__cgap9DUpWjd7Iet7eLnGUWBxc92BArij-ODdAYhH3hF2zIreFjiOOeNaCmdcQnwJZF08KxfapeXCtbyahvZ-afJGL49-Owzfu4f_5o5yZ7lwhfHwCY);
    opacity: 0.05
    }
.aether-gradient {
    background: linear-gradient(135deg, #3525cd 0%, #4f46e5 40%, #fbf9f5 100%)
    }</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fbf9f5] dark:bg-[#1a1b26] docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-semibold tracking-tighter text-[#3525cd] dark:text-[#4f46e5] font-inter">
                BookVerse
            </div>
<div class="flex items-center gap-6">
<button class="material-symbols-outlined text-[#464555] dark:text-[#94a3b8] hover:opacity-80 transition-opacity">help</button>
</div>
</div>
<div class="bg-[#efeeea] dark:bg-[#242637] h-[1px] w-full"></div>
</header>
<!-- Main Content: Sign Up Screen -->
<main class="flex-grow flex items-center justify-center relative overflow-hidden py-12 px-4">
<!-- Aether Gradient Background -->
<div class="absolute inset-0 aether-gradient -z-10"></div>
<div class="absolute inset-0 noise-overlay -z-10"></div>
<!-- Centered Sign Up Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-8 md:p-12 shadow-[0_32px_64px_rgba(53,37,205,0.04)] relative z-10 border border-outline-variant/10">
<div class="mb-10 text-center">
<h1 class="text-3xl font-semibold tracking-tight text-on-surface mb-2 font-headline">Bắt đầu hành trình</h1>
<p class="text-on-surface-variant body-md">Gia nhập thư viện số BookVerse</p>
</div>
<form action="#" class="space-y-6">
<!-- Name Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-outline" for="name">Họ và Tên</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary px-0 py-3 text-on-surface placeholder:text-outline/50 transition-colors focus:ring-0 focus:outline-none bg-transparent" id="name" name="name" placeholder="Nguyễn Văn A" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-outline" for="email">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary px-0 py-3 text-on-surface placeholder:text-outline/50 transition-colors focus:ring-0 focus:outline-none bg-transparent" id="email" name="email" placeholder="example@bookverse.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-outline" for="password">Mật khẩu</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary px-0 py-3 text-on-surface placeholder:text-outline/50 transition-colors focus:ring-0 focus:outline-none bg-transparent" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Privacy Policy Checkbox -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary/20" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                        Tôi đồng ý với các <span class="text-primary cursor-pointer hover:underline">Điều khoản Dịch vụ</span> và <span class="text-primary cursor-pointer hover:underline">Chính sách Bảo mật</span>.
                    </label>
</div>
<!-- Primary Register Button -->
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-semibold rounded-lg hover:opacity-90 transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
                    Đăng ký
                </button>
</form>
<!-- Secondary Link -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                    Đã có tài khoản? 
                    <a class="text-[#4f46e5] font-semibold hover:underline ml-1" href="#">Đăng nhập</a>
</p>
</div>
</div>
<!-- Decorative Element: Floating Book Mesh -->
<div class="absolute -bottom-24 -left-24 w-96 h-96 opacity-10 bg-primary-container rounded-full blur-3xl"></div>
<div class="absolute -top-24 -right-24 w-96 h-96 opacity-10 bg-secondary-container rounded-full blur-3xl"></div>
</main>
<!-- Footer -->
<footer class="bg-[#fbf9f5] dark:bg-[#1a1b26] border-t border-[#efeeea] dark:border-[#242637] full-width py-8 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-6 max-w-7xl mx-auto w-full gap-4">
<div class="text-lg font-bold text-[#3525cd] font-inter">BookVerse</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="text-sm font-inter text-[#464555] dark:text-[#94a3b8] hover:text-[#3525cd] dark:hover:text-[#4f46e5] transition-colors" href="#">Privacy Policy</a>
<a class="text-sm font-inter text-[#464555] dark:text-[#94a3b8] hover:text-[#3525cd] dark:hover:text-[#4f46e5] transition-colors" href="#">Terms of Service</a>
<a class="text-sm font-inter text-[#464555] dark:text-[#94a3b8] hover:text-[#3525cd] dark:hover:text-[#4f46e5] transition-colors" href="#">Contact Support</a>
</div>
<div class="text-xs font-inter text-[#464555] dark:text-[#94a3b8]">
                © 2024 BookVerse Digital Archive. All rights reserved.
            </div>
</div>
</footer>
</body></html>
